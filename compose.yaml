services:
  postgres:
    image: postgres:16
    container_name: wafuri-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wafuri_idle
    ports:
      - "5432:5432"
    volumes:
      - wafuri_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wafuri_idle"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wafuri-redis
    ports:
      - "6379:6379"
    volumes:
      - wafuri_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wafuri_postgres_data:
  wafuri_redis_data:

