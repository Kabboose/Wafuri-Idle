name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wafuri_idle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wafuri_idle"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wafuri_idle?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/wafuri_idle_test?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      PORT: 3001
      JWT_SECRET: ci-test-secret
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_TTL_MS: 2592000000

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace server

      - name: Lint
        run: npm run lint

      - name: Server tests
        run: npm run test --workspace server

      - name: Client build
        run: npm run build --workspace client
